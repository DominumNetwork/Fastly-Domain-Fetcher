<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fastly Domain Fetcher</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --primary: #bb86fc;
            --primary-hover: #9965f4;
            --border: #333;
            --error: #cf6679;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--panel-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
        }

        h1 { margin-top: 0; font-size: 1.5rem; text-align: center; }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        input[type="text"], input[type="password"] {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background-color: #2c2c2c;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            border-color: var(--primary);
        }

        button {
            padding: 12px;
            background-color: var(--primary);
            color: #000;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #555; cursor: not-allowed; }

        #searchContainer { display: none; margin-bottom: 1rem; }

        .loader-container {
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            margin: 2rem 0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #statusText { margin-top: 10px; font-size: 0.9rem; color: #aaa; }

        .domain-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 400px;
            overflow-y: auto;
        }

        .domain-item {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .domain-item:last-child { border-bottom: none; }
        .service-badge { font-size: 0.75rem; background: #333; padding: 4px 8px; border-radius: 4px; }
        .error-message { color: var(--error); text-align: center; margin-top: 1rem; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Fastly Domain Fetcher</h1>
        
        <div class="input-group">
            <input type="password" id="apiKey" placeholder="Enter Fastly API Token" autocomplete="off">
            <button id="fetchBtn" onclick="fetchDomains()">Load Domains</button>
        </div>

        <div class="error-message" id="errorMsg"></div>

        <div class="input-group" id="searchContainer">
            <input type="text" id="searchInput" placeholder="Search for a domain (e.g., global.ssl.fastly.net)" onkeyup="filterDomains()">
        </div>

        <div class="loader-container" id="loader">
            <div class="spinner"></div>
            <div id="statusText">Fetching services...</div>
        </div>

        <ul class="domain-list" id="resultsList"></ul>
    </div>

    <script>
        let allDomains = [];

        async function fetchDomains() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const btn = document.getElementById('fetchBtn');
            const loader = document.getElementById('loader');
            const statusText = document.getElementById('statusText');
            const resultsList = document.getElementById('resultsList');
            const searchContainer = document.getElementById('searchContainer');
            const errorMsg = document.getElementById('errorMsg');

            if (!apiKey) {
                showError("Please enter an API key.");
                return;
            }

            btn.disabled = true;
            errorMsg.style.display = 'none';
            resultsList.innerHTML = '';
            searchContainer.style.display = 'none';
            loader.style.display = 'flex';
            allDomains = [];

            const headers = {
                'Fastly-Key': apiKey,
                'Accept': 'application/json'
            };

            try {
                statusText.innerText = "Fetching services...";
                const serviceRes = await fetch('/fastly-proxy/service', { headers });
                
                if (!serviceRes.ok) throw new Error(`API Error: ${serviceRes.status} ${serviceRes.statusText}`);
                const services = await serviceRes.json();

                statusText.innerText = `Found ${services.length} services. Extracting domains...`;

                for (const service of services) {
                    const activeVersion = service.versions.find(v => v.active)?.number;
                    if (!activeVersion) continue;

                    const domainRes = await fetch(`/fastly-proxy/service/${service.id}/version/${activeVersion}/domain`, { headers });
                    if (domainRes.ok) {
                        const domains = await domainRes.json();
                        domains.forEach(d => {
                            allDomains.push({ name: d.name, serviceName: service.name });
                        });
                    }
                }

                loader.style.display = 'none';
                searchContainer.style.display = 'flex';
                renderList(allDomains);

            } catch (error) {
                loader.style.display = 'none';
                showError(error.message || "Failed to fetch domains. Check API key or console.");
            } finally {
                btn.disabled = false;
            }
        }

        function renderList(domainArray) {
            const resultsList = document.getElementById('resultsList');
            resultsList.innerHTML = '';

            if (domainArray.length === 0) {
                resultsList.innerHTML = '<li class="domain-item" style="justify-content: center; color: #888;">No domains found.</li>';
                return;
            }

            domainArray.forEach(domain => {
                const li = document.createElement('li');
                li.className = 'domain-item';
                li.innerHTML = `
                    <span>${domain.name}</span>
                    <span class="service-badge">${domain.serviceName}</span>
                `;
                resultsList.appendChild(li);
            });
        }

        function filterDomains() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allDomains.filter(d => d.name.toLowerCase().includes(query) || d.serviceName.toLowerCase().includes(query));
            renderList(filtered);
        }

        function showError(msg) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.innerText = msg;
            errorMsg.style.display = 'block';
        }
    </script>
</body>
</html>
